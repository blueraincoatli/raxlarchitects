    <script>
      (() => {
        const SRC_EXT_RE = /\.(png|jpe?g)$/i;
        const IGNORE_EXT_RE = /\.(avif|webp)$/i;

        function isManagedPath(src) {
          return typeof src === "string" && src.startsWith("/images/");
        }

        function withExt(src, ext) {
          return src.replace(SRC_EXT_RE, "." + ext);
        }

        function initFallback(img) {
          if (!img || img.dataset.fallbackInit === "1") return;
          const currentSrc = img.getAttribute("src");
          if (!isManagedPath(currentSrc)) return;
          if (IGNORE_EXT_RE.test(currentSrc)) return;
          if (!SRC_EXT_RE.test(currentSrc)) return;

          img.dataset.fallbackInit = "1";
          img.dataset.sourceOriginal = currentSrc;

          const preferredOriginal = currentSrc.toLowerCase().endsWith(".png")
            ? withExt(currentSrc, "jpg")
            : currentSrc;

          img.dataset.sourcePreferredOriginal = preferredOriginal;
          img.dataset.fallbackStage = "avif";
          img.onerror = () => {
            const stage = img.dataset.fallbackStage;
            if (stage === "avif") {
              img.dataset.fallbackStage = "webp";
              img.src = withExt(currentSrc, "webp");
              return;
            }
            if (stage === "webp") {
              img.dataset.fallbackStage = "preferred";
              img.src = preferredOriginal;
              return;
            }
            if (stage === "preferred" && preferredOriginal !== currentSrc) {
              img.dataset.fallbackStage = "original";
              img.src = currentSrc;
              return;
            }
            img.onerror = null;
          };
          img.src = withExt(currentSrc, "avif");
        }

        function scan(root) {
          root.querySelectorAll?.("img[src]").forEach(initFallback);
          if (root.tagName === "IMG") initFallback(root);
        }

        const boot = () => {
          scan(document);
          const observer = new MutationObserver((mutations) => {
            for (const m of mutations) {
              m.addedNodes.forEach((n) => {
                if (n.nodeType === 1) scan(n);
              });
            }
          });
          observer.observe(document.body, { childList: true, subtree: true });
        };

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", boot, { once: true });
        } else {
          boot();
        }
      })();
    </script>
